# Real-time AI Meeting Platform — full stack.
# Usage: cp .env.example .env && docker compose up --build
# URLs: docs/local-urls.md  |  App: http://localhost/
#
# Networking: only `nginx` publishes a port. postgres and redis have NO `ports` mapping,
# so they are reachable only on the private compose network — never exposed publicly.
# Data safety: postgres and redis both persist to named volumes and survive restart/rebuild.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meetuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetpass}
      POSTGRES_DB: ${POSTGRES_DB:-meetings}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meetuser} -d ${POSTGRES_DB:-meetings}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Append-only file for durability; data persists to the redis_data volume.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-meetuser}:${POSTGRES_PASSWORD:-meetpass}@postgres:5432/${POSTGRES_DB:-meetings}?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      STT_PROVIDER: ${STT_PROVIDER:-mock}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-mock}
      DEFAULT_TARGET_LANG: ${DEFAULT_TARGET_LANG:-ru}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
