# Observability overlay (Phase 5).
# Start with the app:  docker compose --profile monitoring up
# Or attach to running stack: docker compose --profile monitoring up -d
#
# Grafana:    http://localhost:3001  (GRAFANA_USER / GRAFANA_PASSWORD in .env)
# Prometheus: http://localhost:9090
# Loki API:   http://localhost:3100

services:
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    profiles: [monitoring]
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    profiles: [monitoring]
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  promdata:
  lokidata:
  grafanadata:
