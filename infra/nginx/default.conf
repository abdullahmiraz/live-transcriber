# Single public entrypoint. Routes the frontend and backend, and upgrades WebSockets.
# TLS termination and load balancing can be layered here later without app changes.

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    # Reasonable upload size for audio chunks.
    client_max_body_size 10m;

    # --- Backend HTTP API ---
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Ops endpoints ---
    location = /healthz { proxy_pass http://backend_upstream/healthz; }
    location = /readyz  { proxy_pass http://backend_upstream/readyz; }
    location = /metrics { proxy_pass http://backend_upstream/metrics; }

    # --- WebSocket (signaling + realtime events) ---
    location /ws {
        proxy_pass http://backend_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Frontend (SvelteKit, adapter-node) ---
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Map for connection upgrade on the frontend location (HMR/websockets if any).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
